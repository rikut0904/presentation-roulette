<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dashboard | くじ引き</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="/css/style.css" />
</head>

<body class="admin-body">
    <div class="admin-layout">
        <!-- Main Content -->
        <main class="main-content">
            <div class="wrap content-body">
                <div id="admin-status" class="admin-notice">設定を確認しています...</div>

                <div class="page-header">
                    <h1 class="page-title">Dashboard</h1>
                    <button onclick="openCreateModal()" class="btn primary" style="padding: 10px 24px;">
                        <span class="material-symbols-outlined" style="margin-right: 8px;">add_circle</span>
                        新規作成
                    </button>
                </div>

                <div class="admin-grid">
                    <section class="glass-card">
                        <div id="users-empty" class="admin-empty">くじ引きはまだありません。</div>
                        <div id="users-list" class="admin-user-list"></div>
                    </section>
                </div>
            </div>
        </main>
    </div>

    <div id="raffle-modal" class="result-modal">
        <div class="result-modal-backdrop" onclick="closeRaffleModal()"></div>
        <div class="result-modal-dialog">
            <form id="raffle-form" class="modal-split-layout">
                <!-- Left Sidebar: Settings -->
                <aside class="modal-sidebar">
                    <h2 id="modal-title" style="margin: 0; font-size: 1.5rem; font-weight: 800;">くじ引きの編集</h2>
                    
                    <div style="display: flex; flex-direction: column; gap: 20px; margin-top: 16px;">
                        <input type="hidden" id="edit-id">
                        <label class="admin-field">
                            <span>タイトル</span>
                            <input type="text" id="modal-raffle-title" placeholder="例: 週末のランチ" required>
                        </label>
                        <label class="admin-field">
                            <span>説明 (任意)</span>
                            <input type="text" id="modal-raffle-desc" placeholder="どこに行くか迷った時に">
                        </label>

                        <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 0.9rem; padding: 14px; background: white; border-radius: 14px; border: 1px solid #e2e8f0; transition: all 0.2s;">
                            <input type="checkbox" id="modal-prevent-duplicates" style="width: 18px; height: 18px; cursor: pointer;">
                            <span style="font-weight: 600;">重複当選の防止</span>
                        </label>
                    </div>
                    
                    <div style="margin-top: auto; color: var(--text-muted); font-size: 0.8rem; line-height: 1.5; background: rgba(0,0,0,0.03); padding: 16px; border-radius: 12px;">
                        <strong>ヒント:</strong><br>
                        右側の「項目設定」から参加者を追加できます。比重を大きくすると当たりやすくなります。
                    </div>
                </aside>

                <main class="modal-main-content">
                    <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h3 style="margin: 0; font-size: 1rem; font-weight: 700;">項目設定</h3>
                        <button type="button" onclick="addItemToModal()" class="btn primary" style="padding: 8px 16px; font-size: 0.85rem;">
                            <span class="material-symbols-outlined" style="margin-right: 6px; font-size: 1.1rem;">add_circle</span>
                            追加
                        </button>
                    </header>

                    <div id="modal-item-list" class="modal-items-scroll">
                    </div>

                    <footer class="modal-footer-actions">
                        <button type="button" onclick="closeRaffleModal()" class="btn">キャンセル</button>
                        <button type="submit" class="btn primary">保存</button>
                    </footer>
                </main>
            </form>
        </div>
    </div>

    <script type="module" src="/js/dashboard.js"></script>
    <script type="module">
        import { openCreateModal, closeRaffleModal, addItemToModal } from '/js/dashboard.js';
        window.openCreateModal = openCreateModal;
        window.closeRaffleModal = closeRaffleModal;
        window.addItemToModal = addItemToModal;
    </script>
</body>

</html>
