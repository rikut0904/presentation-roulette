<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>くじ引き</title>
    <link rel="stylesheet" href="/css/style.css" />
</head>

<body>
    <main class="wrap">
        <section class="intro-hero">
            <div>
                <div class="intro-content">
                    <h2 class="section-title">項目設定</h2>
                    <div id="item-editor" class="glass-card" style="padding: 24px;">
                        <div class="item-editor-header">
                            <input type="text" id="new-item-label" placeholder="新しい項目名" class="item-editor-input">
                            <button class="btn" id="add-item-button" style="padding: 10px 20px;">追加</button>
                        </div>
                        <div id="item-list" class="legend-list">
                            <!-- Items will be rendered here -->
                        </div>
                        <div class="item-editor-footer">
                            <button id="reset-items-button" class="reset-link-btn">初期状態に戻す</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="glass-card">
                <p class="eyebrow" style="margin-bottom: 4px;">Now Playing</p>
                <h2 id="index-raffle-title" style="margin-bottom: 24px;">くじ引き</h2>
                <div class="raffle-stage">
                    <div id="raffle-ticket" class="raffle-ticket">
                        <span id="ticket-label"></span>
                    </div>
                    <div id="raffle-box" class="raffle-box" onclick="spin()">
                        <span class="raffle-box-label">くじ引き</span>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer wrap">
        <div class="footer-content">
            <small class="footer-copy">&copy; 2026 rikut0904. All rights reserved.</small>
            <nav class="footer-nav">
                <a class="footer-nav-link primary" href="/dashboard">Dashboard</a>
                <a class="footer-nav-link secondary" href="/login">Login</a>
            </nav>
        </div>
    </footer>

    <script type="module" src="/js/index.js"></script>
    <script type="module">
        import { addItem, removeItem, resetItems, clearHistory, spin } from '/js/index.js';
        window.addItem = addItem;
        window.removeItem = removeItem;
        window.resetItems = resetItems;
        window.clearHistory = clearHistory;
        window.spin = spin;
    </script>
</body>

</html>
