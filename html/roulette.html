<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Roulette - Presentation Roulette</title>
    <link rel="stylesheet" href="/css/style.css" />
</head>

<body>
    <main class="wrap">
        <section class="intro-hero">
            <div>
                <p class="eyebrow" id="roulette-eyebrow">Play</p>
                <h1 id="roulette-title">Loading...</h1>
                <p class="intro-lead" id="roulette-description"></p>
                
                <div class="intro-actions">
                    <button class="btn primary" id="spin-button" type="button" onclick="spin()">ルーレットを回す</button>
                </div>

                <div style="margin-top: 48px;">
                    <h2 style="font-size: 1.25rem; margin-bottom: 20px;">項目一覧</h2>
                    <div class="glass-card" style="padding: 24px;">
                        <div id="item-list" class="legend-list">
                            <!-- Items will be rendered here -->
                        </div>
                    </div>
                </div>
            </div>

            <div class="glass-card">
                <p class="eyebrow" style="margin-bottom: 4px;">Now Playing</p>
                <div class="wheel-stage">
                    <div class="pointer" aria-hidden="true"></div>
                    <div class="wheel" id="index-wheel"></div>
                </div>
            </div>
        </section>
    </main>

    <footer class="wrap" style="padding: 40px 0; border-top: 1px solid var(--glass-border);">
        <div class="footer-row">
            <small>&copy; 2026 rikut0904. All rights reserved.</small>
        </div>
    </footer>

    <script type="module" src="/js/roulette.js"></script>
    <script type="module">
        import { spin } from '/js/roulette.js';
        window.spin = spin;
    </script>
</body>

</html>
