<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>新規登録 | くじ引き</title>
    <link rel="stylesheet" href="/css/style.css" />
</head>

<body class="admin-body">
    <div class="admin-layout" style="justify-content: center; align-items: center;">
        <main class="content-body" style="padding: 20px;">
            <div id="admin-status" class="admin-notice">設定を確認しています...</div>

            <section class="admin-card auth-card">
                <div style="text-align: center; margin-bottom: 32px;">
                    <h1 style="font-size: 1.75rem; font-weight: 800; letter-spacing: -0.025em; margin-bottom: 8px;">Create Account</h1>
                    <p style="color: var(--text-muted); font-size: 0.95rem;">くじ引き管理システムのアカウント作成</p>
                </div>
                <form id="signin-form" class="admin-form">
                    <label class="admin-field">
                        <span>メールアドレス</span>
                        <input type="email" id="signin-email" placeholder="you@example.com" required autocomplete="email">
                    </label>
                    <label class="admin-field">
                        <span>パスワード</span>
                        <input type="password" id="signin-password" placeholder="••••••••" required autocomplete="new-password" minlength="8">
                    </label>
                    <button type="submit" class="btn primary" style="width: 100%; margin-top: 12px;">アカウント作成</button>
                </form>

                <div style="margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--glass-border); text-align: center;">
                    <p style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 12px;">既にアカウントをお持ちの場合</p>
                    <a href="/login" class="btn" style="width: 100%;">ログイン画面へ</a>
                </div>
            </section>

            <div style="text-align: center; margin-top: 24px;">
                <a href="/" style="color: var(--text-muted); text-decoration: none; font-size: 0.9rem; font-weight: 500;">← トップページに戻る</a>
            </div>
        </main>
    </div>

    <script type="module" src="/js/signin.js"></script>
</body>

</html>
